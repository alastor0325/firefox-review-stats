name: Weekly refresh

on:
  schedule:
    # 09:00 UTC every Monday. Adjust via cron expression.
    - cron: '0 9 * * 1'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to push regenerated data + html

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout firefox-review-stats
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest playwright

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Restore Phabricator HTML cache
        # Persists .phab_html_cache/ between weekly runs so analyze_phab.py
        # only fetches new D-numbers via Playwright. Without this every run
        # would re-scrape ~500 revisions and likely trip the Varnish 429.
        uses: actions/cache@v4
        with:
          path: .phab_html_cache
          key: phab-html-cache-${{ github.run_id }}
          restore-keys: |
            phab-html-cache-

      - name: Run unit tests
        run: python -m pytest tests/unit/

      - name: Generate landing report (GitHub commits)
        run: python analyze_git.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wait-time report (Phabricator timelines)
        run: python analyze_phab.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate per-author listing
        run: python dump_author_patches.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A data_git.json data_phab.json index.html author_patches.txt raw_data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "weekly: $(date -u +'%G-W%V refresh')"
            git push
          fi
